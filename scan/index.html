      text-align: center;

    .feature-list { font-size: 12px; color: #555; margin-top: 16px; line-height: 2; }
    .loading { color: #666; font-size: 14px; }
    .error { color: #f55; font-size: 14px; margin-bottom: 16px; }
    .countdown { font-size: 12px; color: #555; margin-top: 12px; }
    .ios-hint {

      text-align: left;

<body>
  <div class="card" id="card">
    <div class="loading">Loading…</div>
  </div>

  <script>
    const API_BASE    = "https://businesswheels-production.up.railway.app";
    const STORAGE_KEY = "bw_unlocked_vendors";

    /* ── PWA install prompt (Android/Chrome) ── */
    let deferredPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    /* ── localStorage helpers ── */
    function getUnlocked() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function addVendor(id) {
      const list = getUnlocked();
      if (list.includes(id)) return false; // already had it
      list.push(id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      return true; // newly added
    }

    /* ── Detect iOS Safari (no beforeinstallprompt support) ── */
    function isIOS() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    }

    /* ── Is already running as installed PWA? ── */
    function isInstalled() {
      return window.navigator.standalone === true
          || window.matchMedia("(display-mode: standalone)").matches;
    }

    async function fetchVendor(id) {
      try {
        // Public endpoint — no JWT required
        const res = await fetch(API_BASE + "/api/public/vendors/" + id);
        if (res.ok) return await res.json();
      } catch {}
      return null;
    }

    function startCountdown(secs, cb) {
      let rem = secs;
      const el = document.getElementById("countdown");
      if (!el) return;
      el.textContent = "Redirecting in " + rem + "s…";
      const t = setInterval(() => {
        rem--;
        if (el) el.textContent = "Redirecting in " + rem + "s…";
        if (rem <= 0) { clearInterval(t); cb(); }
      }, 1000);
    }

    async function init() {
      const card = document.getElementById("card");
      const params = new URLSearchParams(location.search);
      const vendorId = params.get("v");

      /* ── No vendor param — generic splash ── */
      if (!vendorId) {
        card.innerHTML = `
          <div class="app-logo">🚚</div>
          <div class="app-name">Business Wheels</div>
          <div class="app-tagline">On-demand local delivery</div>
          <p style="color:#666;font-size:14px;margin-top:8px">
            Scan a store's QR code to get started.
          </p>
        `;
        return;
      }

      /* ── Fetch vendor info (no auth needed) ── */
      const vendor = await fetchVendor(vendorId);

      if (!vendor) {
        card.innerHTML = `
          <div class="app-logo">🚚</div>
          <div class="app-name">Business Wheels</div>
          <div class="error">Store not found. Please try scanning again.</div>
          <a class="btn btn-primary" href="/customer/">Open App</a>
        `;
        return;
      }

      /*
       * KEY LOGIC — decide returning vs new BEFORE adding this vendor.
       *
       * isReturning = had at least one store already in localStorage.
       *   → They've used the app before. App is installed. Just add the store.
       *
       * !isReturning = zero stores before this scan.
       *   → First time ever. Show install prompt.
       *
       * We deliberately do NOT use sessionStorage / JWT here because
       * sessionStorage is wiped on tab close, making every re-open look "new".
       */
      const existingVendors = getUnlocked();        // snapshot BEFORE adding
      const isReturning     = existingVendors.length > 0;
      const isNew           = addVendor(vendorId);  // add to localStorage
      const totalUnlocked   = getUnlocked().length;

      /* ───────────────────────────────────────────────────────────
         RETURNING CUSTOMER
         Had ≥1 store before → app is already on their device.
         Just show what was added and redirect.
      ──────────────────────────────────────────────────────────── */
      if (isReturning) {
        const bannerHtml = isNew
          ? `<div class="added-banner">
               <strong>✅ ${vendor.name} added!</strong>
               You can now order from ${vendor.name}
             </div>`
          : `<div class="already-banner">
               <strong>👍 Already in your app</strong>
               ${vendor.name} is already available to you
             </div>`;

        card.innerHTML = `
          <div class="app-logo">🚚</div>
          <div class="app-name">Business Wheels</div>
          <div class="app-tagline">On-demand local delivery</div>
          <hr class="divider" />
            <div class="vendor-emoji">${vendor.img}</div>
          <div class="vendor-name">${vendor.name}</div>
          <div class="vendor-meta">${vendor.category} · ${vendor.area}</div>
          ${bannerHtml}
          <a class="btn btn-primary" href="/customer/">Shop Now →</a>
          <div class="stores-count">
            You have <span>${totalUnlocked}</span> store${totalUnlocked !== 1 ? "s" : ""} unlocked
          </div>
          <div class="countdown" id="countdown"></div>
        `;

        startCountdown(3, () => { window.location.href = "/customer/"; });
        return;
      }

      /* ────────────────────────────────────────────────────────────
         NEW CUSTOMER — first scan ever
         0 stores before this scan → show install prompt.
      ──────────────────────────────────────────────────────────── */
      card.innerHTML = `
        <div class="app-logo">🚚</div>
        <div class="app-name">Business Wheels</div>
        <div class="app-tagline">On-demand local delivery</div>
        <hr class="divider" />
        <div class="vendor-emoji">${vendor.img}</div>
        <div class="vendor-name">${vendor.name}</div>
        <div class="vendor-meta">${vendor.category} · ${vendor.area}</div>
        <div class="ready-badge">⚩ Ready to deliver</div>
        <a class="btn btn-primary" href="/customer/">Get Started →</a>
        <button class="btn btn-ghost" id="installBtn" style="display:none">
          📲 Add to Home Screen
        </button>
        <div class="ios-hint" id="iosHint">
          📲 To install: tap the <strong>Share</strong> button in Safari,
          then choose <strong>"Add to Home Screen"</strong>
        </div>
        <div class="feature-list">
          🛒 Browse menu &nbsp;·&nbsp; 🚴 Track delivery &nbsp;·&nbsp; ❤️ Save favourites
        </div>
      `;

      const installBtn = document.getElementById("installBtn");
      const iosHint    = document.getElementById("iosHint");

      /* Show iOS install hint */
      if (isIOS() && !isInstalled()) {
        if (iosHint) iosHint.style.display = "block";
      }

      /* Show Android install button if prompt already fired */
      if (deferredPrompt && installBtn) {
        installBtn.style.display = "block";
      }

      /* Also catch prompt that fires after render */
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (installBtn) installBtn.style.display = "block";
      });

      installBtn?.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (outcome === "accepted") window.location.href = "/customer/";
      });
    }

    /* ── Register service worker ── */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }

    init();
  </script>
